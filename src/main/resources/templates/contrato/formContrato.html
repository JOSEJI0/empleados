<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TSP | Registro de Contrato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <header th:insert="~{fragmento/fragment :: header}"></header>
    <main class="container mt-5 mb-5">
        <div class="card shadow">
            <div class="card-header bg-white py-3">
                <h2 class="text-center mb-0 text-primary">FORMULARIO DE CONTRATO</h2>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/contrato/guardar}" method="post" th:object="${contrato}" class="row g-4">
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{activo}">

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Empleado:</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <select th:field="*{empleado.id}" class="form-select" required>
                                <option value="">Seleccione al empleado...</option>
                                <option th:each="emp : ${empleados}" th:value="${emp.id}" th:text="${emp.nombreE + ' ' + emp.apellido}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">NSS (Número de Seguridad Social):</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                            <input type="text" th:field="*{numeroSeguroSocial}" class="form-control" placeholder="Ingrese NSS" required>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Tipo de Contrato:</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-file-contract"></i></span>
                            <select th:field="*{tipoContrato}" class="form-select" required>
                                <option value="Temporal">Temporal</option>
                                <option value="Indefinido">Indefinido</option>
                                <option value="Por Proyecto">Por Proyecto</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12 mt-5 text-center">
                        <hr>
                        <button type="submit" class="btn btn-success px-4 shadow-sm">
                            <i class="fas fa-save me-1"></i> Guardar Contrato
                        </button>
                        <a th:href="@{/contrato/listar}" class="btn btn-secondary px-4 ms-2 shadow-sm">
                            <i class="fas fa-arrow-left me-1"></i> Regresar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer th:insert="~{fragmento/fragment :: footer}"></footer>
</body>
</html>
