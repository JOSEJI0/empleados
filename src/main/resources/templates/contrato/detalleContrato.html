<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TSP | Detalle de Contrato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <header th:insert="~{fragmento/fragment :: header}"></header>
    <main class="container mt-5 mb-5">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white py-3">
                <h3 class="text-center mb-0">Detalles del Contrato #<span th:text="${contrato.id}"></span></h3>
            </div>
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-4 text-center">
                        <i class="fas fa-file-signature fa-9x text-secondary mb-3"></i>
                    </div>
                    <div class="col-md-8">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item"><strong>Nombre del Empleado:</strong> <span th:text="${contrato.empleado.nombreE + ' ' + contrato.empleado.apellido}"></span></li>
                            <li class="list-group-item"><strong>NSS:</strong> <span th:text="${contrato.numeroSeguroSocial}"></span></li>
                            <li class="list-group-item"><strong>Tipo de Contrato:</strong> <span th:text="${contrato.tipoContrato}"></span></li>
                            <li class="list-group-item"><strong>Estatus:</strong> 
                                <span th:if="${contrato.activo == 1}" class="badge bg-success">Vigente</span>
                                <span th:unless="${contrato.activo == 1}" class="badge bg-danger">Cancelado</span>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="text-center mt-5">
                    <a th:href="@{/contrato/listar}" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Volver a la lista
                    </a>
                    <a th:href="@{/contrato/imprimir/{id}(id=${contrato.id})}" class="btn btn-dark ms-2">
                        <i class="fas fa-file-pdf me-1"></i> Generar PDF
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer th:insert="~{fragmento/fragment :: footer}"></footer>
</body>
</html>
