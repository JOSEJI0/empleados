<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistema de Gestión | Lista de Contratos</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body {
	display: flex;
	flex-direction: column;
	min-height: 100vh;
}

main {
	flex: 1;
}
</style>
</head>
<body class="bg-light">
	<header th:insert="~{fragmento/fragment :: header}"></header>

	<main class="container mt-5 mb-5">
		<div th:if="${msg} != null"
			class="alert alert-success alert-dismissible fade show mb-4 shadow-sm"
			role="alert">
			<i class="fas fa-check-circle me-1"></i> <span th:text="${msg}"></span>
			<button type="button" class="btn-close" data-bs-dismiss="alert"
				aria-label="Close"></button>
		</div>

		<div class="card shadow">
			<div class="card-header bg-white py-3">
				<h2 class="text-center mb-0 text-primary">GESTIÓN DE CONTRATOS</h2>
			</div>
			<div class="card-body">
				<form th:action="@{/contrato/buscar}" method="get"
					class="row g-3 mb-4">
					<div class="col-md-4">
						<input type="text" name="nombre" class="form-control"
							placeholder="Buscar por empleado...">
					</div>
					<div class="col-md-3">
						<input type="text" name="numero" class="form-control"
							placeholder="No. Contrato">
					</div>
					<div class="col-md-3">
						<select name="tipo" class="form-select">
							<option value="">Todos los tipos</option>
							<option value="Temporal">Temporal</option>
							<option value="Indefinido">Indefinido</option>
						</select>
					</div>
					<div class="col-md-2">
						<button type="submit" class="btn btn-dark w-100">
							<i class="fas fa-search"></i>
						</button>
					</div>
				</form>

				<div class="table-responsive">
					<table
						class="table table-bordered table-hover text-center align-middle">
						<thead class="table-dark">
							<tr>
								<th>No. Contrato</th>
								<th>Empleado</th>
								<th>NSS</th>
								<th>Tipo</th>
								<th>Estado</th>
								<th>Operaciones</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="contrato : ${contratos}">
								<td th:text="${contrato.id}"></td>
								<td
									th:text="${contrato.empleado.nombreE + ' ' + contrato.empleado.apellido}"></td>
								<td th:text="${contrato.numeroSeguroSocial}"></td>
								<td th:text="${contrato.tipoContrato}"></td>
								<td><span th:if="${contrato.activo == 1}"
									class="badge bg-success">Activo</span> <span
									th:unless="${contrato.activo == 1}" class="badge bg-danger">Inactivo</span>
								</td>
								<td>
									<div class="btn-group" role="group">
										<a th:href="@{/contrato/ver/{id}(id=${contrato.id})}"
											class="btn btn-info btn-sm text-white" title="Ver Detalle">
											<i class="fas fa-eye"></i>
										</a> <a th:href="@{/contrato/imprimir/{id}(id=${contrato.id})}"
											class="btn btn-dark btn-sm" title="Imprimir PDF"
											target="_blank"> <i class="fas fa-print"></i>
										</a> <a sec:authorize="hasAuthority('ADMIN')"
											th:href="@{/contrato/editar/{id}(id=${contrato.id})}"
											class="btn btn-warning btn-sm text-white" title="Editar">
											<i class="fas fa-edit"></i>
										</a> <a sec:authorize="hasAuthority('ADMIN')"
											th:href="@{/contrato/eliminar/{id}(id=${contrato.id})}"
											class="btn btn-danger btn-sm"
											onclick="return confirm('¿Desea desactivar este contrato?');"
											title="Eliminar"> <i class="fas fa-trash"></i>
										</a>
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>

				<div class="text-center mt-4">
					<a class="btn btn-primary shadow-sm" th:href="@{/contrato/nuevo}">
						<i class="fas fa-plus-circle me-1"></i> Registrar Nuevo Contrato
					</a>
				</div>
			</div>
		</div>
	</main>
	<footer th:insert="~{fragmento/fragment :: footer}"></footer>
</body>
</html>
