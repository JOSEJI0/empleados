<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Lista de Contratos</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body {
	display: flex;
	flex-direction: column;
	min-height: 100vh;
	background-color: #f8f9fa;
}

main {
	flex: 1;
}
</style>
</head>
<body>

	<header th:insert="~{fragmentos/fragments :: header}"></header>

	<main class="container mt-5 mb-5">

		<div class="card shadow-sm border-0">
			<div
				class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
				<h3 class="mb-0 text-secondary fw-bold">Gestión de Contratos</h3>
				<a th:href="@{/contrato/crear}" class="btn btn-primary"> <i
					class="bi bi-file-earmark-plus-fill"></i> Nuevo Contrato
				</a>
			</div>

			<div class="card-body p-0">

				<div th:if="${msg != null}"
					class="alert alert-success alert-dismissible fade show m-3"
					role="alert">
					<i class="bi bi-check-circle-fill me-2"></i> <span th:text="${msg}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"
						aria-label="Close"></button>
				</div>

				<div class="card bg-light mb-4 border-0 shadow-sm mx-3 mt-3">
					<div class="card-body py-3">
						<form th:action="@{/contrato/contratos}" method="get"
							class="row g-3 align-items-end">

							<div class="col-md-2">
								<label class="form-label fw-bold small text-secondary mb-1">Folio
									(ID)</label> <input type="number" name="idSearch" class="form-control"
									placeholder="Ej: 5" th:value="${idSearch}">
							</div>

							<div class="col-md-4">
								<label class="form-label fw-bold small text-secondary mb-1">Nombre
									del Empleado</label> <input type="text" name="nombreSearch"
									class="form-control" placeholder="Ej: Juan Pérez"
									th:value="${nombreSearch}">
							</div>

							<div class="col-md-4">
								<label class="form-label fw-bold small text-secondary mb-1">Tipo
									de Contrato</label> <select name="tipoSearch" class="form-select">
									<option value="">-- Todos los tipos --</option>
									<option value="Indeterminado"
										th:selected="${tipoSearch == 'Indeterminado'}">Tiempo
										Indeterminado</option>
									<option value="Determinado"
										th:selected="${tipoSearch == 'Determinado'}">Tiempo
										Determinado</option>
									<option value="Honorarios"
										th:selected="${tipoSearch == 'Honorarios'}">Honorarios</option>
									<option value="Prueba" th:selected="${tipoSearch == 'Prueba'}">Periodo
										de Prueba</option>
								</select>
							</div>

							<div class="col-md-2 d-flex gap-2">
								<button type="submit" class="btn btn-primary w-100">
									<i class="bi bi-search"></i> Filtrar
								</button>
								<a th:href="@{/contrato/contratos}" class="btn btn-secondary"
									title="Limpiar Filtros"> <i class="bi bi-eraser-fill"></i>
								</a>
							</div>

						</form>
					</div>
				</div>
				<div class="table-responsive">
					<table class="table table-hover table-striped align-middle mb-0">
						<thead class="table-dark text-center">
							<tr>
								<th>Folio (ID)</th>
								<th>Empleado</th>
								<th>NSS</th>
								<th>Tipo de Contrato</th>
								<th>Estado</th>
								<th>Acciones</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="contrato : ${contratosLista}">

								<td class="text-center fw-bold" th:text="${contrato.id}">1</td>

								<td>
									<div class="fw-bold text-primary">
										<i class="bi bi-person-fill me-1"></i> <span
											th:if="${contrato.empleado != null}"
											th:text="${contrato.empleado.nombre} + ' ' + ${contrato.empleado.apellidos}">Empleado</span>
										<span th:unless="${contrato.empleado != null}"
											class="text-danger">Sin asignar</span>
									</div>
								</td>

								<td class="text-center"><span
									class="badge bg-light text-dark border font-monospace"
									th:text="${contrato.noSeguroSocial}">NSS</span></td>

								<td class="text-center" th:text="${contrato.tipoContrato}">Indefinido</td>

								<td class="text-center"><span
									th:if="${contrato.estado == 1}"
									class="badge bg-success rounded-pill">Vigente</span> <span
									th:if="${contrato.estado == 0}"
									class="badge bg-secondary rounded-pill">Vencido /
										Inactivo</span></td>

								<td class="text-center">
									<div class="btn-group" role="group">
										<a th:href="@{/contrato/ver/{id}(id=${contrato.id})}"
											class="btn btn-outline-info btn-sm" title="Ver Detalle">
											<i class="bi bi-eye-fill"></i>
										</a> <a th:href="@{/contrato/editar/{id}(id=${contrato.id})}"
											class="btn btn-outline-warning btn-sm" title="Editar"> <i
											class="bi bi-pencil-fill"></i>
										</a> <a th:href="@{/contrato/eliminar/{id}(id=${contrato.id})}"
											class="btn btn-outline-danger btn-sm"
											title="Mover a Papelera"
											onclick="return confirm('¿Estás seguro de mover este contrato a la papelera?');">
											<i class="bi bi-trash-fill"></i>
										</a>
									</div>
								</td>
							</tr>
						</tbody>
					</table>

					<div th:if="${contratosLista.empty}"
						class="text-center p-5 text-muted">
						<i class="bi bi-file-earmark-x fs-1"></i>
						<p class="mt-2">No hay contratos registrados en el sistema.</p>
					</div>
				</div>
			</div>
		</div>
	</main>

	<footer th:insert="~{fragmentos/fragments :: footer}"></footer>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
