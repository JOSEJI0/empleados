<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Contrato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
        .card-header-custom { background: linear-gradient(to right, #212529, #343a40); color: white; }
    </style>
</head>
<body>

    <header th:insert="~{fragmentos/fragments :: header}"></header>

    <main class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-header card-header-custom p-4">
                        <h4 class="mb-0"><i class="bi bi-file-earmark-text me-2"></i>Detalles del Contrato</h4>
                    </div>
                    
                    <div class="card-body p-4">
                        
                        <form th:action="@{/contrato/guardar}" method="post" th:object="${contrato}">
                            
                            <input type="hidden" th:field="*{id}" />

                            <div class="row mb-4">
                                <div class="col-12">
                                    <label class="form-label fw-bold text-primary"><i class="bi bi-person-badge"></i> Asignar Empleado</label>
                                    <select th:field="*{empleado.id}" class="form-select border-primary" required>
                                        <option value="" disabled selected>-- Selecciona un Empleado --</option>
                                        <option th:each="emp : ${listaEmpleados}" 
                                                th:value="${emp.id}" 
                                                th:text="${emp.nombre} + ' ' + ${emp.apellidos}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Número de Seguro Social (NSS)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-hospital"></i></span>
                                        <input type="text" th:field="*{noSeguroSocial}" class="form-control" placeholder="Ej: 11 dígitos" required maxlength="11">
                                    </div>
                                    <small class="text-muted">Ingresa el NSS registrado ante el IMSS.</small>
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label class="form-label fw-bold">Tipo de Contrato</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-tag"></i></span>
                                        <select th:field="*{tipoContrato}" class="form-select" required>
                                            <option value="" disabled selected>-- Seleccione el tipo --</option>
                                            <option value="Indeterminado">Tiempo Indeterminado</option>
                                            <option value="Determinado">Tiempo Determinado</option>
                                            <option value="Honorarios">Honorarios</option>
                                            <option value="Prueba">Periodo de Prueba</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
								    <label for="estado" class="form-label fw-bold text-secondary">Estado del Contrato</label>
								    <select class="form-select" th:field="*{estado}" id="estado" required>
								        <option th:value="1">Vigente / Activo</option>
								        <option th:value="0">Vencido / Inactivo / Cancelado</option>
								    </select>
								</div>
                            </div>
                            
                            <hr class="my-4">

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/contrato/contratos}" class="btn btn-secondary px-4">
                                    <i class="bi bi-x-circle me-1"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-success px-4">
                                    <i class="bi bi-save me-1"></i> Guardar Contrato
                                </button>
                            </div>
                            
                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <footer th:insert="~{fragmentos/fragments :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
