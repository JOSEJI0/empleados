<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TSP | Registro de Empleado</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
	<header th:insert="~{fragmento/fragment :: header}"></header>
	<main class="container mt-5 mb-5">
		<div class="card shadow">
			<div class="card-header bg-white py-3">
				<h2 class="text-center mb-0 text-primary fw-bold">FORMULARIO DE EMPLEADO</h2>
			</div>
			<div class="card-body p-4">
				<form th:action="@{/empleado/guardar}" method="post" th:object="${empleado}" enctype="multipart/form-data" class="row g-4">

					<input type="hidden" th:field="*{id}"> 
					<input type="hidden" th:field="*{foto}">

					<div class="col-md-6" th:if="*{id != null}">
						<label class="form-label fw-bold">ID Empleado:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-fingerprint"></i></span> 
							<input type="text" th:field="*{id}" class="form-control" readonly>
						</div>
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold">Nombre:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-user"></i></span>
							<input type="text" th:field="*{nombreE}" class="form-control" placeholder="Ingrese el nombre" required>
						</div>
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold">Apellido:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-users"></i></span>
							<input type="text" th:field="*{apellido}" class="form-control" placeholder="Ingrese el apellido" required>
						</div>
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold">Salario Mensual:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-dollar-sign"></i></span> 
							<input type="number" step="0.01" min="0" th:field="*{salario}" class="form-control" placeholder="0.00" required>
						</div>
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold">Fecha de Ingreso:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-calendar-alt"></i></span> 
							<input type="date" th:field="*{fechaIngreso}" class="form-control" required>
						</div>
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold">Departamento Asignado:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-building"></i></span>
							<select th:field="*{departamento.id}" class="form-select" required>
								<option value="">Selecciona un departamento...</option>
								<option th:each="depto : ${departamentos}" th:value="${depto.id}" th:text="${depto.nombre}"></option>
							</select>
						</div>
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold">Fotografía del Perfil:</label>
						<div class="input-group mb-3">
							<span class="input-group-text"><i class="fas fa-camera"></i></span>
							<input type="file" name="archivoImagen" id="archivoImagen" class="form-control" onchange="previewImage(event)">
						</div>
					</div>

					<div class="col-md-6 text-center">
						<div class="border rounded p-2 bg-white mx-auto" style="height: 160px; width: 160px; display: flex; align-items: center; justify-content: center;">
							<img id="imgPreview" th:src="${empleado.foto != null && empleado.foto != 'no-imagen.jpg'} ? @{/imagenes/{img}(img=${empleado.foto})} : @{/images/no-imagen.jpg}" alt="Previsualización" class="img-thumbnail rounded-circle h-100 w-100" style="object-fit: cover;">
						</div>
					</div>

					<div class="col-md-12">
						<label class="form-label fw-bold">Habilidades Técnicas Vinculadas:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-tools"></i></span>
							<select th:field="*{habilidades}" class="form-select" multiple size="4">
								<option th:each="hab : ${todasHabilidades}" th:value="${hab.id}" th:text="${hab.nombre}"></option>
							</select>
						</div>
						<small class="text-muted"><i class="fas fa-info-circle me-1"></i>Mantén presionado Ctrl (o Cmd) para seleccionar múltiples habilidades.</small>
					</div>

					<div class="col-12 mt-4 text-center">
						<hr>
						<button type="submit" class="btn btn-success px-4 shadow-sm fw-bold">
							<i class="fas fa-save me-1"></i> Guardar Empleado
						</button>
						<a th:href="@{/empleado/listar}" class="btn btn-secondary px-4 ms-2 shadow-sm"> 
							<i class="fas fa-arrow-left me-1"></i> Regresar
						</a>
					</div>
				</form>
			</div>
		</div>
	</main>
	<footer th:insert="~{fragmento/fragment :: footer}"></footer>

	<script>
    function previewImage(event) {
        const reader = new FileReader();
        const imageField = document.getElementById('imgPreview');
        reader.onload = function() {
            if (reader.readyState === 2) { imageField.src = reader.result; }
        }
        if (event.target.files[0]) { reader.readAsDataURL(event.target.files[0]); }
    }
	</script>
</body>
</html>
