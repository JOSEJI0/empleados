<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TSP | Registro de Empleado</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body {
	display: flex;
	flex-direction: column;
	min-height: 100vh;
}

main {
	flex: 1;
}

.navbar-brand img {
	height: 40px;
}
</style>
</head>
<body class="bg-light">
	<header th:insert="~{fragmento/fragment :: header}"></header>
	<main class="container mt-5 mb-5">
		<div class="card shadow">
			<div class="card-header bg-white py-3">
				<h2 class="text-center mb-0 text-primary">REGISTRAR NUEVO
					EMPLEADO</h2>
			</div>
			<div class="card-body">
				<form th:action="@{/empleado/guardar}" method="post"
					th:object="${empleado}" enctype="multipart/form-data"
					class="row g-4">

					<input type="hidden" th:field="*{id}"> <input type="hidden"
						th:field="*{foto}">

					<div class="col-md-6">
						<label for="id" class="form-label fw-bold">ID:</label>
						<div class="input-group">
							<span class="input-group-text"><i
								class="fas fa-fingerprint"></i></span> <input type="text"
								th:field="*{id}" id="id" class="form-control"
								placeholder="Generado automáticamente" readonly>
						</div>
					</div>

					<div class="col-md-6">
						<label for="nombreE" class="form-label fw-bold">Nombre:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-user"></i></span>
							<input type="text" th:field="*{nombreE}" id="nombreE"
								class="form-control" placeholder="Ingrese el nombre" required>
						</div>
					</div>

					<div class="col-md-6">
						<label for="apellido" class="form-label fw-bold">Apellido:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-users"></i></span>
							<input type="text" th:field="*{apellido}" id="apellido"
								class="form-control" placeholder="Ingrese el apellido" required>
						</div>
					</div>

					<div class="col-md-6">
						<label for="salario" class="form-label fw-bold">Salario:</label>
						<div class="input-group">
							<span class="input-group-text"><i
								class="fas fa-dollar-sign"></i></span> <input type="number" step="0.01"
								min="0" th:field="*{salario}" id="salario" class="form-control"
								placeholder="0.00" required>
						</div>
					</div>

					<div class="col-md-6">
						<label for="fechaIngreso" class="form-label fw-bold">Fecha
							de Ingreso:</label>
						<div class="input-group">
							<span class="input-group-text"><i
								class="fas fa-calendar-alt"></i></span> <input type="date"
								th:field="*{fechaIngreso}" id="fechaIngreso"
								class="form-control" required>
						</div>
					</div>

					<div class="col-md-6">
						<label for="activo" class="form-label fw-bold">Estado:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-toggle-on"></i></span>
							<select th:field="*{activo}" id="activo" class="form-select"
								required>
								<option th:value="1">Activo</option>
								<option th:value="0">Inactivo</option>
							</select>
						</div>
					</div>

					<div class="col-md-6">
						<label for="departamento" class="form-label fw-bold">Departamento:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-building"></i></span>
							<select th:field="*{departamento.id}" id="departamento"
								class="form-select" required>
								<option value="">Selecciona un departamento</option>
								<option th:each="depto : ${departamentos}"
									th:value="${depto.id}" th:text="${depto.nombre}"></option>
							</select>
						</div>
					</div>

					<div class="col-md-6">
						<label for="archivoImagen" class="form-label fw-bold">Fotografía:</label>
						<div class="input-group mb-3">
							<span class="input-group-text"><i class="fas fa-camera"></i></span>
							<input type="file" name="archivoImagen" id="archivoImagen"
								class="form-control" onchange="previewImage(event)">
						</div>

						<div class="text-center border rounded p-2 bg-white"
							style="height: 200px; display: flex; align-items: center; justify-content: center;">
							<img id="imgPreview"
								th:src="${empleado.foto != null} ? @{/imagenes/{img}(img=${empleado.foto})} : @{/images/no-image.png}"
								alt="Previsualización" class="img-thumbnail"
								style="max-height: 100%; max-width: 100%;">
						</div>
					</div>

					<script>
    function previewImage(event) {
        const reader = new FileReader();
        const imageField = document.getElementById('imgPreview');

        reader.onload = function() {
            if (reader.readyState === 2) {
                imageField.src = reader.result;
            }
        }
        
        if (event.target.files[0]) {
            reader.readAsDataURL(event.target.files[0]);
        }
    }
</script>

					<div class="col-md-12">
						<label for="habilidades" class="form-label fw-bold">Habilidades
							del Empleado:</label>
						<div class="input-group">
							<span class="input-group-text"><i class="fas fa-tools"></i></span>
							<select th:field="*{habilidades}" id="habilidades"
								class="form-select" multiple size="5">
								<option th:each="hab : ${todasHabilidades}" th:value="${hab.id}"
									th:text="${hab.nombre}"></option>
							</select>
						</div>
						<small class="text-muted">Mantén presionado Ctrl (o Cmd)
							para seleccionar varias.</small>
					</div>

					<div class="col-12 mt-5 text-center">
						<hr>
						<button type="submit" class="btn btn-success px-4 shadow-sm">
							<i class="fas fa-save me-1"></i> Guardar Empleado
						</button>
						<a th:href="@{/empleado/listar}"
							class="btn btn-secondary px-4 ms-2 shadow-sm"> <i
							class="fas fa-arrow-left me-1"></i> Regresar
						</a>
					</div>
				</form>
			</div>
		</div>
	</main>
	<footer th:insert="~{fragmento/fragment :: footer}"></footer>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
