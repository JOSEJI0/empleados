<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistema de Gestión | Datos del Empleado</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body {
	display: flex;
	flex-direction: column;
	min-height: 100vh;
}

main {
	flex: 1;
}

.navbar-brand img {
	height: 40px;
}

.img-profile {
	width: 50px;
	height: 50px;
	object-fit: cover;
}
</style>
</head>
<body class="bg-light">
	<header th:insert="~{fragmento/fragment :: header}"></header>

	<main class="container mt-5 mb-5">
		<div th:if="${msg} != null"
			class="alert alert-success alert-dismissible fade show mb-4 shadow-sm"
			role="alert">
			<i class="fas fa-check-circle me-1"></i> <span th:text="${msg}"></span>
			<button type="button" class="btn-close" data-bs-dismiss="alert"
				aria-label="Close"></button>
		</div>

		<div class="card shadow">
			<div class="card-header bg-white py-3">
				<h2 class="text-center mb-0 text-primary">DATOS DEL EMPLEADO</h2>
			</div>
			<div class="card-body">
				<div class="table-responsive">
					<table
						class="table table-bordered table-hover text-center align-middle">
						<thead class="table-dark">
							<tr>
								<th>ID</th>
								<th>Nombre</th>
								<th>Apellido</th>
								<th>Salario</th>
								<th>Fecha de Ingreso</th>
								<th>Estado</th>
								<th>Foto</th>
								<th>Operaciones</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="empleado : ${empleados}">
								<td th:text="${empleado.id}"></td>
								<td th:text="${empleado.nombreE}"></td>
								<td th:text="${empleado.apellido}"></td>
								<td
									th:text="${'$ ' + #numbers.formatDecimal(empleado.salario, 1, 'COMMA', 2, 'POINT')}"></td>
								<td
									th:text="${#dates.format(empleado.fechaIngreso, 'dd-MM-yyyy')}"></td>
								<td><span th:if="${empleado.activo == 1}"
									class="badge bg-success">Activo</span> <span
									th:unless="${empleado.activo == 1}" class="badge bg-danger">Inactivo</span>
								</td>
								<td><img th:if="${empleado.foto != null}"
									th:src="@{/imagenes/{img}(img=${empleado.foto})}" alt="Foto"
									class="rounded-circle shadow-sm img-profile"> <img
									th:unless="${empleado.foto != null}"
									src="https://via.placeholder.com/50?text=S/F"
									class="rounded-circle shadow-sm img-profile"></td>
								<td sec:authorize="hasAuthority('ROLE_ADMIN')">
									<div class="btn-group">
										<a th:href="@{/empleado/editar/{id}(id=${empleado.id})}"
											class="btn btn-warning btn-sm"> <i class="fas fa-edit"></i>
										</a> <a th:href="@{/empleado/eliminar/{id}(id=${empleado.id})}"
											class="btn btn-danger btn-sm"> <i class="fas fa-trash"></i>
										</a>
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>

				<div class="text-center mt-4">
					<a class="btn btn-primary shadow-sm" th:href="@{/empleado/nuevo}">
						<i class="fas fa-plus-circle me-1"></i> Agregar Nuevo Empleado
					</a>
				</div>
			</div>
		</div>
	</main>

	<footer th:insert="~{fragmento/fragment :: footer}"></footer>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
