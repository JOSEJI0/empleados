<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Proyectos y Actividades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f8f9fa; } main { flex: 1; }</style>
</head>
<body>

    <header th:insert="~{fragmentos/fragments :: header}"></header>

    <main class="container mt-5 mb-5">
        <div class="card shadow-sm border-0 border-top border-primary border-4">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h3 class="mb-0 text-primary fw-bold"><i class="bi bi-kanban me-2"></i>Mis Actividades Asignadas</h3>
                <a th:href="@{/mi-panel}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Volver</a>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light text-center">
                            <tr>
                                <th>Proyecto Perteneciente</th>
                                <th>Actividad Específica</th>
                                <th>Fecha de Asignación</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="asignacion : ${actividadesLista}">
                                
                                <td>
                                    <div class="fw-bold text-dark" th:text="${asignacion.actividad.proyecto.nombre}">Proyecto</div>
                                </td>
                                
                                <td>
                                    <span class="text-primary" th:text="${asignacion.actividad.nombre}">Actividad</span><br>
                                    <small class="text-muted" th:text="${asignacion.actividad.descripcion}">Descripción</small>
                                </td>
                                
                                <td class="text-center" th:text="${#dates.format(asignacion.fechaAsignacion, 'dd-MM-yyyy')}">01-01-2024</td>
                                
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${actividadesLista.empty}" class="text-center p-5 text-muted">
                        <i class="bi bi-cup-hot fs-1"></i>
                        <p class="mt-2">No tienes actividades asignadas actualmente.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:insert="~{fragmentos/fragments :: footer}"></footer>
</body>
</html>
