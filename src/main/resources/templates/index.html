<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Inicio - ITCH</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Estructura para asegurar que el footer permanezca siempre abajo */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
        /* Efecto hover elegante para las tarjetas de proyectos */
        .project-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.12) !important;
        }
    </style>
</head>
<body class="bg-light">
    <div th:insert="~{fragmento/fragment :: header}"></div>

    <main class="container mt-5 mb-5">
        <div class="p-4 mb-5 bg-white rounded-4 shadow-sm border border-0">
            <div class="text-center mb-4">
                <h1 class="display-6 fw-bold text-primary mb-1">Panel Principal de Proyectos</h1>
                <p class="text-muted">Mostrando únicamente proyectos activos en curso (sin fecha de finalización).</p>
            </div>
            
            <form th:action="@{/}" method="get" class="row g-3 align-items-end">
                <div class="col-xl-4 col-md-12">
                    <label class="form-label fw-semibold text-secondary small"><i class="fas fa-project-diagram me-1"></i> Nombre del Proyecto</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-secondary"><i class="fas fa-search"></i></span>
                        <input type="text" name="nombre" th:value="${param.nombre}" class="form-control bg-light border-start-0 ps-0" placeholder="Ej: Sistema de Inventarios...">
                    </div>
                </div>
                
                <div class="col-xl-3 col-sm-6">
                    <label class="form-label fw-semibold text-secondary small"><i class="far fa-calendar-plus me-1"></i> Fecha Inicio (Desde)</label>
                    <input type="date" name="inicio" th:value="${param.inicio}" class="form-control bg-light" title="Fecha Inicio Rango">
                </div>
                <div class="col-xl-3 col-sm-6">
                    <label class="form-label fw-semibold text-secondary small"><i class="far fa-calendar-check me-1"></i> Fecha Fin (Hasta)</label>
                    <input type="date" name="fin" th:value="${param.fin}" class="form-control bg-light" title="Fecha Fin Rango">
                </div>
                
                <div class="col-xl-2 col-md-12">
                    <div class="row g-2">
                        <div class="col-6 col-xl-12">
                            <button type="submit" class="btn btn-primary w-100 fw-semibold shadow-sm">
                                <i class="fas fa-filter me-1"></i> Filtrar
                            </button>
                        </div>
                        <div class="col-6 col-xl-12">
                            <a th:href="@{/}" class="btn btn-outline-secondary w-100 fw-semibold">
                                <i class="fas fa-eraser me-1"></i> Limpiar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div class="col" th:each="p : ${proyectosInicio}">
                <div class="card h-100 border-0 shadow-sm rounded-4 project-card bg-white">
                    <div class="card-body p-4 d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title text-uppercase fw-bold text-dark mb-0 th-text" th:text="${p.nombre}"></h5>
                            <span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-2">Activo</span>
                        </div>
                        <p class="card-text text-secondary small flex-grow-1" th:text="${p.descripcion}"></p>
                        <hr class="text-black-50 my-3">
                        <p class="card-text small text-muted mb-0 d-flex align-items-center">
                            <i class="far fa-calendar-alt text-primary me-2 fs-6"></i>
                            <span>Iniciado el: <strong class="text-dark" th:text="${#dates.format(p.fechaInicio, 'dd/MM/yyyy')}"></strong></span>
                        </p>
                    </div>
                    <div class="card-footer bg-transparent border-0 px-4 pb-4 pt-0">
                        <a th:href="@{/proyecto/ver/{id}(id=${p.id})}" class="btn btn-light border w-100 fw-semibold text-primary">
                            <i class="fas fa-eye me-1"></i> Ver detalles
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(proyectosInicio)}">
                <div class="p-5 bg-white rounded-4 border shadow-sm">
                    <i class="fas fa-folder-open fa-4x text-body-tertiary mb-3"></i>
                    <h4 class="text-secondary fw-semibold">Sin resultados</h4>
                    <p class="text-muted mb-0">No se encontraron proyectos activos bajo el criterio de búsqueda especificado.</p>
                </div>
            </div>
        </div>
    </main>

    <footer th:insert="~{fragmento/fragment :: footer}"></footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
