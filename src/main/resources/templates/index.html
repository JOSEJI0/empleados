<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Sistema de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        main {
            flex: 1;
        }
        /* Estilos para el Encabezado Principal (Hero) */
        .hero-section {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border-radius: 1rem;
            padding: 4rem 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 3rem;
        }
        /* Efectos modernos para las tarjetas de acceso rápido */
        .module-card {
            border: none;
            border-radius: 1rem;
            transition: all 0.3s ease;
            background: white;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block; /* Para que todo el enlace sea clickeable */
        }
        .module-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important;
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            font-size: 2.5rem;
        }
        /* Colores específicos para cada módulo */
        .bg-empleados { background-color: rgba(13, 110, 253, 0.1); color: #0d6efd; }
        .bg-departamentos { background-color: rgba(25, 135, 84, 0.1); color: #198754; }
        .bg-contratos { background-color: rgba(255, 193, 7, 0.1); color: #ffc107; }
        .bg-proyectos { background-color: rgba(111, 66, 193, 0.1); color: #6f42c1; }
    </style>
</head>
<body>

    <header th:insert="~{fragmentos/fragments :: header}"></header>

    <main class="container mt-4 mb-5">
        
        <div class="row g-4 justify-content-center">
            
            <div class="col-sm-6 col-lg-3">
                <a th:href="@{/empleado/empleados}" class="card module-card shadow-sm h-100 p-4 text-center">
                    <div class="icon-wrapper bg-empleados">
                        <i class="bi bi-people-fill"></i>
                    </div>
                    <h5 class="fw-bold mb-2">Empleados</h5>
                    <p class="text-muted small mb-0">Gestión de personal, salarios y perfiles.</p>
                </a>
            </div>

            <div class="col-sm-6 col-lg-3">
                <a th:href="@{/departamento/departamentos}" class="card module-card shadow-sm h-100 p-4 text-center">
                    <div class="icon-wrapper bg-departamentos">
                        <i class="bi bi-buildings-fill"></i>
                    </div>
                    <h5 class="fw-bold mb-2">Departamentos</h5>
                    <p class="text-muted small mb-0">Estructura organizacional y áreas.</p>
                </a>
            </div>

            <div class="col-sm-6 col-lg-3">
                <a th:href="@{/contratos/contratos}" class="card module-card shadow-sm h-100 p-4 text-center">
                    <div class="icon-wrapper bg-contratos">
                        <i class="bi bi-file-earmark-text-fill"></i>
                    </div>
                    <h5 class="fw-bold mb-2">Contratos</h5>
                    <p class="text-muted small mb-0">Documentación y vinculación laboral.</p>
                </a>
            </div>

            <div class="col-sm-6 col-lg-3">
                <a th:href="@{/proyectos/proyectos}" class="card module-card shadow-sm h-100 p-4 text-center">
                    <div class="icon-wrapper bg-proyectos">
                        <i class="bi bi-kanban-fill"></i>
                    </div>
                    <h5 class="fw-bold mb-2">Proyectos</h5>
                    <p class="text-muted small mb-0">Control de tareas, fechas y progreso.</p>
                </a>
            </div>

        </div>

    </main>

    <footer th:insert="~{fragmentos/fragments :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
