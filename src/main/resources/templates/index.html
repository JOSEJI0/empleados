<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Página de Inicio - ITCH</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div th:insert="~{fragmento/fragment :: header}"></div>

    <div class="p-5 mb-4 bg-light rounded-3">
        <div class="container-fluid py-5">
            <h1 class="display-5 fw-bold">Bienvenido al Sistema de Empleados</h1>
            <p class="col-md-8 fs-4">Este sistema permite la gestión de usuarios, perfiles y control de acceso utilizando Spring Security y JPA.</p>
            <hr class="my-4">
            <div class="d-grid gap-2 d-md-flex justify-content-md-start">
                <a th:href="@{/usuarios/signup}" class="btn btn-primary btn-lg px-4 me-md-2">Registrarse Ahora</a>
                <a th:href="@{/usuarios/index}" class="btn btn-outline-secondary btn-lg px-4">Ver Listado</a>
            </div>
        </div>
    </div>
</body>
</html>
