<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Perfiles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div th:insert="~{fragmento/menu :: menu-principal}"></div>
    
    <div class="d-flex justify-content-between mb-3">
        <h2>Listado de Perfiles</h2>
        <a th:href="@{/perfiles/create}" class="btn btn-primary">Nuevo Perfil</a>
    </div>

    <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>

    <table class="table table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre del Perfil</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${listaPerfiles}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.perfil}"></td>
                <td>
                    <a th:href="@{/perfiles/delete/{id} (id=${p.id})}" 
                       onclick="return confirm('¿Eliminar este perfil?')" 
                       class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
