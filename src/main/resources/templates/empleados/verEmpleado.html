<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ficha del Empleado - Area 51</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
        .profile-avatar { width: 150px; height: 150px; object-fit: cover; border: 3px solid #dee2e6; }
        .label-custom { font-size: 0.8rem; font-weight: 700; color: #6c757d; text-transform: uppercase; }
        .value-custom { font-size: 1.1rem; color: #212529; margin-bottom: 0; }
    </style>
</head>
<body>

    <header th:insert="~{fragmentos/fragments :: header}"></header>

    <main class="container mt-5 mb-5">
        <div class="mb-4">
            <a th:href="@{/empleado/empleados}" class="btn btn-link text-decoration-none text-dark fw-bold">
                <i class="bi bi-arrow-left"></i> Volver al listado
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                <h4 class="mb-0 text-secondary fw-bold">Ficha de Identidad Laboral</h4>
                <a th:href="@{/empleado/editar/{id}(id=${empleado.id})}" class="btn btn-outline-warning btn-sm">
                    <i class="bi bi-pencil-fill"></i> Editar Perfil
                </a>
            </div>

            <div class="card-body p-4 p-md-5">
                <div class="row">
                    <div class="col-md-4 text-center border-end">
                        <img th:if="${empleado.foto != null and empleado.foto != 'no-imagen.jpg'}" th:src="@{'/empleados/' + ${empleado.foto}}" class="rounded-circle profile-avatar shadow-sm mb-3">
                        <img th:unless="${empleado.foto != null and empleado.foto != 'no-imagen.jpg'}" src="https://via.placeholder.com/150?text=N/A" class="rounded-circle profile-avatar shadow-sm bg-secondary mb-3">
                        
                        <h4 class="fw-bold mb-1" th:text="${empleado.nombre} + ' ' + ${empleado.apellidos}">Nombre</h4>
                        <p class="text-muted small">ID: #<span th:text="${empleado.id}">0</span></p>
                        
                        <span th:text="${empleado.estado == 1 ? 'ACTIVO' : 'INACTIVO'}"
                              th:class="${empleado.estado == 1 ? 'badge bg-success rounded-pill' : 'badge bg-secondary rounded-pill'}">
                        </span>
                    </div>

                    <div class="col-md-8 ps-md-5">
                        <div class="row g-4">
                            <div class="col-12">
                                <h5 class="text-primary border-bottom pb-2 mb-3"><i class="bi bi-info-circle me-2"></i>Información General</h5>
                            </div>

                            <div class="col-md-6">
                                <p class="label-custom mb-1">Departamento</p>
                                <p class="value-custom fw-bold" th:text="${empleado.departamento != null ? empleado.departamento.nombre : 'Sin asignar'}"></p>
                            </div>

                            <div class="col-md-6">
                                <p class="label-custom mb-1">Fecha de Ingreso</p>
                                <p class="value-custom" th:text="${#dates.format(empleado.fechaIngreso, 'dd-MM-yyyy')}"></p>
                            </div>

                            <div class="col-md-6">
                                <p class="label-custom mb-1">Salario Mensual</p>
                                <p class="value-custom text-success fw-bold" th:text="'$' + ${#numbers.formatDecimal(empleado.salario, 1, 'COMMA', 2, 'POINT')}"></p>
                            </div>

                            <div class="col-md-6">
                                <p class="label-custom mb-1">Acceso al Sistema</p>
                                <div class="value-custom">
                                    <span th:if="${empleado.usuario != null}" class="badge bg-primary">
                                        <i class="bi bi-person-check me-1"></i> Usuario: <span th:text="${empleado.usuario.username}"></span>
                                    </span>
                                    <span th:unless="${empleado.usuario != null}" class="badge bg-light text-muted border">
                                        <i class="bi bi-person-x me-1"></i> Sin Cuenta
                                    </span>
                                </div>
                            </div>

                            <div class="col-12 mt-4">
                                <h6 class="text-secondary fw-bold mb-3">Contratos Vigentes</h6>
                                <div th:if="${empleado.contratos != null and !empleado.contratos.empty}" class="table-responsive border rounded">
                                    <table class="table table-sm table-hover mb-0">
                                        <thead class="table-light">
                                            <tr><th class="ps-3">Folio</th><th>Tipo</th><th>NSS</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="contrato : ${empleado.contratos}">
                                                <td class="ps-3 fw-bold" th:text="'#' + ${contrato.id}"></td>
                                                <td th:text="${contrato.tipoContrato}"></td>
                                                <td class="text-muted" th:text="${contrato.noSeguroSocial}"></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                                <div th:unless="${empleado.contratos != null and !empleado.contratos.empty}" class="alert alert-light border text-muted py-2">
                                    <small><i class="bi bi-exclamation-triangle me-2"></i>No se encontraron contratos registrados.</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:insert="~{fragmentos/fragments :: header}"></footer>
</body>
</html>
