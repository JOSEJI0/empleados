<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Empleado - Area 51</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
        .card-header-custom { background: linear-gradient(to right, #212529, #343a40); color: white; }
    </style>
</head>
<body>

    <header th:insert="~{fragmentos/fragments :: header}"></header>

    <main class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-header card-header-custom p-4">
                        <h4 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i>Información del Empleado</h4>
                    </div>
                    
                    <div class="card-body p-4">
                        <form th:action="@{/empleado/guardar}" method="post" th:object="${empleado}" enctype="multipart/form-data">
                            
                            <input type="hidden" th:field="*{id}" />

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="nombre" class="form-label fw-bold">Nombre</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                        <input type="text" th:field="*{nombre}" class="form-control" id="nombre" required>
                                    </div>
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label for="apellidos" class="form-label fw-bold">Apellidos</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-person-badge"></i></span>
                                        <input type="text" th:field="*{apellidos}" class="form-control" id="apellidos" required>
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-4">
                                    <label for="salario" class="form-label fw-bold">Salario Mensual</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-currency-dollar"></i></span>
                                        <input type="number" step="0.01" th:field="*{salario}" class="form-control" id="salario">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label for="departamento" class="form-label fw-bold">Departamento</label>
                                    <select th:field="*{departamento.id}" class="form-select" id="departamento">
                                        <option th:each="depto : ${listaDepartamentos}" th:value="${depto.id}" th:text="${depto.nombre}"></option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="estado" class="form-label fw-bold">Estado</label>
                                    <select th:field="*{estado}" class="form-select" id="estado">
                                        <option value="1">Activo</option>
                                        <option value="0">Inactivo</option>
                                    </select>
                                </div>
                            </div>

                            <div th:if="*{id == null}" class="p-3 mb-4 bg-light rounded border border-primary-subtle">
                                <h6 class="text-primary mb-3 fw-bold"><i class="bi bi-shield-lock me-2"></i>Cuenta de Acceso al Sistema</h6>
                                <div class="row">
                                    <div class="col-md-6 mb-3 mb-md-0">
                                        <label for="username" class="form-label">Usuario</label>
                                        <input type="text" name="username" id="username" class="form-control" placeholder="Ej. jperez">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="password" class="form-label">Contraseña</label>
                                        <input type="password" name="password" id="password" class="form-control">
                                    </div>
                                </div>
                                <div class="form-text mt-2"><i class="bi bi-info-circle"></i> Si se omiten estos campos, el empleado no tendrá acceso al sistema.</div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Fotografía de Perfil</label>
                                <div class="d-flex align-items-center gap-3">
                                    <img th:if="*{foto != null and foto != 'no-imagen.jpg'}" th:src="@{'/empleados/' + *{foto}}" class="rounded border shadow-sm" style="width: 80px; height: 80px; object-fit: cover;">
                                    <img th:unless="*{foto != null and foto != 'no-imagen.jpg'}" src="https://via.placeholder.com/80?text=Sin+Foto" class="rounded border shadow-sm bg-secondary" style="width: 80px; height: 80px; object-fit: cover;">
                                    
                                    <div class="flex-grow-1">
                                        <input type="hidden" th:field="*{foto}" />
                                        <input type="file" name="file" class="form-control" accept="image/*">
                                    </div>
                                </div>
                            </div>

                            <hr>
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/empleado/empleados}" class="btn btn-secondary px-4">Cancelar</a>
                                <button type="submit" class="btn btn-success px-4"><i class="bi bi-save me-1"></i> Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:insert="~{fragmentos/fragments :: footer}"></footer>
</body>
</html>
