<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        main {
            flex: 1;
        }
        .avatar-table {
            width: 50px; 
            height: 50px; 
            object-fit: cover;
            border: 2px solid #dee2e6;
        }
    </style>
</head>
<body>

    <header th:insert="~{fragmentos/fragments :: header}" ></header>

    <main class="container mt-5 mb-5">
        
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                <h3 class="mb-0 text-secondary fw-bold">Gestión de Empleados</h3>
                <a th:href="@{/empleado/crear}" class="btn btn-primary">
                    <i class="bi bi-person-plus-fill"></i> Nuevo Empleado
                </a>
            </div>

            <div class="card-body p-0">
                
                <div th:if="${msg != null}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${msg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle mb-0">
                        <thead class="table-dark text-center">
                            <tr>
                                <th>ID</th>
                                <th>Foto</th>
                                <th>Empleado</th>
                                <th>Departamento</th>
                                <th>Salario</th>
                                <th>Estado Operativo</th> 
                                <th>Fecha Ingreso</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="empleado : ${empleadosLista}">
                                
                                <td class="text-center fw-bold" th:text="${empleado.id}">1</td>
                                
                                <td class="text-center">	
								    <img th:if="${empleado.foto != null and empleado.foto != 'no-imagen.jpg' and empleado.foto != ''}" 
								         th:src="@{'/imagenes/empleados/' + ${empleado.foto}}"
								         alt="Foto" class="rounded-circle avatar-table shadow-sm">
								    
								    <img th:unless="${empleado.foto != null and empleado.foto != 'no-imagen.jpg' and empleado.foto != ''}" 
								         src="https://via.placeholder.com/50?text=U"
								         alt="Sin Foto" class="rounded-circle avatar-table shadow-sm bg-secondary">
								</td>

                                <td>
                                    <div class="fw-bold" th:text="${empleado.nombre} + ' ' + ${empleado.apellidos}">Nombre Completo</div>
                                </td>
                                
                                 <td class="text-center">
								    <span th:if="${empleado.departamento != null}" 
								          th:text="${empleado.departamento.nombre}" 
								          class="badge bg-light text-dark border">
								    </span>
								    <span th:unless="${empleado.departamento != null}" class="text-muted italic">
								        Sin asignar
								    </span>
								</td>  

                                <td class="text-end pe-4" th:text="'$' + ${#numbers.formatDecimal(empleado.salario, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                                
                                <td class="text-center">
                                    <span th:if="${empleado.estado == 1}" class="badge bg-success rounded-pill"><i class="bi bi-check-circle me-1"></i>Activo</span>
                                    <span th:if="${empleado.estado == 0}" class="badge bg-secondary rounded-pill"><i class="bi bi-pause-circle me-1"></i>Inactivo / Baja</span>
                                </td>
                                
                                <td class="text-center" th:text="${#dates.format(empleado.fechaIngreso, 'dd-MM-yyyy')}">01-01-2024</td>
                                
                                <td class="text-center">
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/empleado/ver/{id}(id=${empleado.id})}" class="btn btn-outline-info btn-sm" title="Ver Detalle">
                                            <i class="bi bi-eye-fill"></i>
                                        </a>
                                        <a th:href="@{/empleado/editar/{id}(id=${empleado.id})}" class="btn btn-outline-warning btn-sm" title="Editar">
                                            <i class="bi bi-pencil-fill"></i>
                                        </a>
                                        <a th:href="@{/empleado/eliminar/{id}(id=${empleado.id})}" class="btn btn-outline-danger btn-sm" title="Eliminar" 
                                           onclick="return confirm('¿Estás seguro de enviar este empleado a la papelera?');">
                                            <i class="bi bi-trash-fill"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <div th:if="${empleadosLista.empty}" class="text-center p-5 text-muted">
                        <i class="bi bi-inbox fs-1"></i>
                        <p class="mt-2">No hay empleados registrados.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:insert="~{fragmentos/fragments :: footer}" >
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
