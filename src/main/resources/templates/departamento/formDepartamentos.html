<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Departamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
        .card-header-custom {
            background: linear-gradient(to right, #212529, #343a40);
            color: white;
        }
    </style>
</head>
<body>

    <header th:insert="~{fragmentos/fragments :: header}"></header>

    <main class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-header card-header-custom p-4">
                        <h4 class="mb-0"><i class="bi bi-building-add me-2"></i>Información del Departamento</h4>
                    </div>
                    
                    <div class="card-body p-4">
                        
                        <form th:action="@{/departamento/guardar}" method="post" th:object="${departamento}" enctype="multipart/form-data">
                            
                            <input type="hidden" th:field="*{id}" />

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="nombre" class="form-label fw-bold">Nombre del Departamento</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-building"></i></span>
                                        <input type="text" th:field="*{nombre}" class="form-control" id="nombre" placeholder="Ej: Tecnología" required>
                                    </div>
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label class="form-label fw-bold">Estado</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-toggle-on"></i></span>
                                        <select th:field="*{activo}" class="form-select">
                                            <option value="true">Activo</option>
                                            <option value="false">Inactivo</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="descripcion" class="form-label fw-bold">Descripción</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-card-text"></i></span>
                                    <textarea th:field="*{descripcion}" class="form-control" id="descripcion" rows="2" placeholder="Funciones principales de esta área..." required></textarea>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Fotografía Representativa</label>
                                
                                <div class="d-flex align-items-center gap-3 mt-2">
                                    <div>
                                        <img th:if="*{fotoDep != null and fotoDep != 'no-imagen-Dep.jpg' and fotoDep != ''}" 
                                             th:src="@{'/departamentos/' + *{fotoDep}}"
                                             alt="Logo actual" 
                                             class="rounded border shadow-sm" style="width: 80px; height: 80px; object-fit: cover;">
                                             
                                        <img th:unless="*{fotoDep != null and fotoDep != 'no-imagen-Dep.jpg' and fotoDep != ''}" 
                                             src="https://via.placeholder.com/80?text=Sin+Logo"
                                             alt="Sin Logo" 
                                             class="rounded border shadow-sm bg-secondary" style="width: 80px; height: 80px; object-fit: cover;">
                                    </div>
                                    
                                    <div class="flex-grow-1">
                                        <input type="hidden" th:field="*{fotoDep}" />
                                        
                                        <div class="input-group">
                                            <input type="file" name="file" class="form-control" id="inputGroupFile02" accept="image/*">
                                            <label class="input-group-text" for="inputGroupFile02"><i class="bi bi-camera-fill"></i></label>
                                        </div>
                                        <div class="form-text text-muted">
                                            Formatos permitidos: JPG, PNG. Tamaño máximo: 2MB. <br>
                                            
                                            <span th:if="*{id != null}" class="text-primary fw-bold">
                                                <i class="bi bi-info-circle"></i> Archivo guardado: <span th:text="*{fotoDep}"></span>. Si no seleccionas nada, se mantendrá.
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <hr class="my-4">

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/departamento/departamentos}" class="btn btn-secondary px-4">
                                    <i class="bi bi-x-circle me-1"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-success px-4">
                                    <i class="bi bi-save me-1"></i> Guardar Departamento
                                </button>
                            </div>
                            
                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <footer th:insert="~{fragmentos/fragments :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
