<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Detalle del Departamento - Sistema RRHH</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body {
	display: flex;
	flex-direction: column;
	min-height: 100vh;
	background-color: #f8f9fa;
}

main {
	flex: 1;
}
/* Estilo coherente con tu tabla */
.profile-avatar {
	width: 150px;
	height: 150px;
	object-fit: cover;
	border: 3px solid #dee2e6;
	transition: transform 0.2s;
}

.profile-avatar:hover {
	transform: scale(1.02);
}

.label-custom {
	font-size: 0.85rem;
	font-weight: 700;
	color: #6c757d;
	text-transform: uppercase;
	letter-spacing: 0.5px;
}

.value-custom {
	font-size: 1.1rem;
	color: #212529;
	margin-bottom: 0;
}
</style>
</head>
<body>

	<header th:insert="~{/fragmentos/fragments :: header}"></header>

	<main class="container mt-5 mb-5">

		<div class="mb-4">
			<a th:href="@{/departamento/departamentos}"
				class="btn btn-link text-decoration-none p-0 text-dark fw-bold">
				<i class="bi bi-arrow-left"></i> Volver al listado de departamentos
			</a>
		</div>

		<div class="card shadow-sm border-0">
			<div
				class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
				<h3 class="mb-0 text-secondary fw-bold">Ficha del Departamento</h3>
				<div class="btn-group">
					<a th:href="@{/departamento/editar/{id}(id=${departamento.id})}"
						class="btn btn-outline-warning"> <i class="bi bi-pencil-fill"></i>
						Editar
					</a>
				</div>
			</div>

			<div class="card-body p-4 p-md-5">
				<div class="row">

					<div class="col-md-4 text-center border-end-md">
						<div class="position-relative d-inline-block mb-3">
							<div class="col-sm-4 text-center mb-3 mb-sm-0 border-end-sm">
								<img
									th:if="${departamento.fotoDep != null and departamento.fotoDep != 'no-imagen-Dep.jpg' and departamento.fotoDep != ''}"
									th:src="@{'/departamentos/' + ${departamento.fotoDep}}"
									alt="Foto del Departamento"
									class="rounded-circle profile-avatar shadow-sm"> <img
									th:unless="${departamento.fotoDep != null and departamento.fotoDep != ''}"
									src="https://via.placeholder.com/150?text=Sin+Imagen"
									class="profile-avatar rounded-circle shadow border bg-light"
									alt="Imagen por defecto">
							</div>
						</div>

						<h4 class="fw-bold mb-1" th:text="${departamento.nombre}">Nombre
							del Depto</h4>
						<p class="text-muted small">
							ID Departamento: #<span th:text="${departamento.id}">0</span>
						</p>

						<div class="mt-3">
							<span
								th:text="${departamento.activo == 1} ? 'Activo' : 'Inactivo'"
								th:class="${departamento.activo == 1} ? 'badge bg-success rounded-pill px-3 py-2' : 'badge bg-secondary rounded-pill px-3 py-2'">
							</span>
						</div>
					</div>

					<div class="col-md-8 ps-md-5">
						<div class="row g-4">

							<div class="col-12">
								<h5 class="text-primary border-bottom pb-2 mb-3">
									<i class="bi bi-building me-2"></i>Información del Área
								</h5>
							</div>

							<div class="col-12">
								<p class="label-custom mb-1">
									<i class="bi bi-card-text me-1"></i> Descripción y Funciones
								</p>
								<p class="value-custom text-dark"
									th:text="${departamento.descripcion}"></p>
							</div>

							<div class="col-12 mt-4">
								<div
									class="p-3 bg-light rounded border-start border-4 border-primary">
									<p class="mb-0 small text-muted">
										<i class="bi bi-info-circle-fill text-primary me-1"></i> Esta
										área es fundamental para la estructura organizacional.
										Mantener su información actualizada garantiza un buen flujo de
										trabajo.
									</p>
								</div>
							</div>

						</div>
					</div>

				</div>
			</div>
		</div>
	</main>

	<footer th:insert="~{/fragmentos/fragments :: footer}"></footer>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
