<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TSP | Registro de Departamento</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body {
	display: flex;
	flex-direction: column;
	min-height: 100vh;
}

main {
	flex: 1;
}
</style>
</head>
<body class="bg-light">
	<header th:insert="~{fragmento/fragment :: header}"></header>

	<main class="container mt-5 mb-5">
		<div class="card shadow">
			<div class="card-header bg-white py-3">
				<h2 class="text-center mb-0 text-primary">REGISTRAR
					DEPARTAMENTO</h2>
			</div>
			<div class="card-body">
				<form th:action="@{/departamento/guardar}" method="post"
					th:object="${departamento}" enctype="multipart/form-data"
					class="row g-4">

					<input type="hidden" th:field="*{id}"> <input type="hidden"
						th:field="*{fotoUbicacion}">

					<div class="col-md-6">
						<label for="archivoImagen" class="form-label fw-bold">Imagen
							de Ubicación (Mapa):</label>
						<div class="input-group mb-3">
							<span class="input-group-text"><i class="fas fa-camera"></i></span>
							<input type="file" name="archivoImagen" id="archivoImagen"
								class="form-control" onchange="previewImage(event)">
						</div>
						<div class="text-center border rounded p-2 bg-white"
							style="height: 200px; display: flex; align-items: center; justify-content: center;">
							<img id="imgPreview"
								th:src="${departamento.fotoUbicacion != null && !departamento.fotoUbicacion.isEmpty()} 
                 ? @{/images/{img}(img=${departamento.fotoUbicacion})} 
                 : @{/images/no-image.png}"
								alt="Previsualización" class="img-thumbnail"
								style="max-height: 100%; max-width: 100%;">
						</div>
					</div>

					<div class="col-md-6">
						<div class="mb-3">
							<label class="form-label fw-bold">Nombre del
								Departamento:</label>
							<div class="input-group">
								<span class="input-group-text"><i class="fas fa-building"></i></span>
								<input type="text" th:field="*{nombre}" class="form-control"
									placeholder="Ej. Recursos Humanos" required>
							</div>
						</div>

						<div class="mb-3">
							<label class="form-label fw-bold">Estado:</label>
							<div class="input-group">
								<span class="input-group-text"><i
									class="fas fa-toggle-on"></i></span> <select th:field="*{activo}"
									class="form-select" required>
									<option th:value="1">Activo</option>
									<option th:value="0">Inactivo</option>
								</select>
							</div>
						</div>
					</div>

					<div class="col-12">
						<label class="form-label fw-bold">Descripción:</label>
						<div class="input-group">
							<span class="input-group-text"><i
								class="fas fa-align-left"></i></span>
							<textarea th:field="*{descripcion}" class="form-control" rows="2"
								placeholder="Breve descripción del área"></textarea>
						</div>
					</div>

					<div class="col-12 mt-4 text-center">
						<hr>
						<button type="submit" class="btn btn-success px-4 shadow-sm">
							<i class="fas fa-save me-1"></i> Guardar Departamento
						</button>
						<a th:href="@{/departamento/listar}"
							class="btn btn-secondary px-4 ms-2 shadow-sm"> <i
							class="fas fa-arrow-left me-1"></i> Regresar
						</a>
					</div>
				</form>
			</div>
		</div>
	</main>

	<footer th:insert="~{fragmento/fragment :: footer}"></footer>

	<script>
        function previewImage(event) {
            const reader = new FileReader();
            const imageField = document.getElementById('imgPreview');
            reader.onload = function() {
                if (reader.readyState === 2) {
                    imageField.src = reader.result;
                }
            }
            if (event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }
    </script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
