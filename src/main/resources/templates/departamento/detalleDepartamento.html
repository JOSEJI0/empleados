<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TSP | Detalle del Departamento</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
/* Estructura para mantener el footer al fondo */
body {
	display: flex;
	flex-direction: column;
	min-height: 100vh;
}

main {
	flex: 1;
}

.navbar-brand img {
	height: 40px;
}
</style>
</head>
<body class="bg-light">
	<header th:insert="~{fragmento/fragment :: header}"></header>
	<main class="container mt-5 mb-5">
		<div class="card shadow">
			<div class="card-header bg-white py-3">
				<h2 class="text-center mb-0 text-primary">Detalles del
					Departamento</h2>
			</div>
			<div class="card-body">
				<div class="row">
					<div class="col-md-5 text-center">
						<label class="fw-bold mb-2">Mapa de Ubicación:</label> <img
							th:src="${departamento.fotoUbicacion != null} ? @{/images/{img}(img=${departamento.fotoUbicacion})} : @{/images/no-image.png}"
							class="img-fluid rounded shadow-sm border"
							style="max-width: 100%; height: auto;">
					</div>

					<div class="col-md-7">
						<ul class="list-group list-group-flush">
							<li class="list-group-item"><strong>ID: </strong> <span
								th:text="${departamento.id}"></span></li>
							<li class="list-group-item"><strong>Nombre del
									Departamento: </strong> <span th:text="${departamento.nombre}"></span></li>
							<li class="list-group-item"><strong>Descripción: </strong>
								<p class="mt-2 text-muted" th:text="${departamento.descripcion}"></p>
							</li>
							<li class="list-group-item"><strong>Estatus: </strong> <span
								th:if="${departamento.activo == 1}" class="badge bg-success">Activo</span>
								<span th:unless="${departamento.activo == 1}"
								class="badge bg-danger">Inactivo</span></li>
						</ul>
					</div>
				</div>

				<div class="text-center mt-4">
					<a th:href="@{/departamento/listar}" class="btn btn-secondary">
						<i class="fas fa-arrow-left me-1"></i> Volver a la lista
					</a>
				</div>
			</div>
		</div>
	</main>
	<footer th:insert="~{fragmento/fragment :: footer}"></footer>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
