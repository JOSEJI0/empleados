<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistema de Gestión | Datos del Departamento</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body {
	display: flex;
	flex-direction: column;
	min-height: 100vh;
}

main {
	flex: 1;
}
</style>
</head>
<body class="bg-light">
	<header th:insert="~{fragmento/fragment :: header}"></header>
	<main class="container mt-5 mb-5">
		<div class="card shadow">
			<div class="card-header bg-white py-3">
				<h2 class="text-center mb-0 text-primary">DATOS DE
					DEPARTAMENTOS</h2>
			</div>
			<div class="card-body">
				<div class="table-responsive">
					<table
						class="table table-bordered table-hover text-center align-middle">
						<thead class="table-dark">
							<tr>
								<th>ID</th>
								<th>Nombre</th>
								<th>Descripción</th>
								<th>Estado</th>
								<th>Ubicación</th>
								<th>Operaciones</th>
							</tr>
						</thead>
						<tbody>
							<div th:if="${msg} != null"
								class="alert alert-success alert-dismissible fade show m-3"
								role="alert">
								<i class="fas fa-check-circle me-1"></i> <span th:text="${msg}"></span>
								<button type="button" class="btn-close" data-bs-dismiss="alert"
									aria-label="Close"></button>
							</div>
							<tr th:each="departamento : ${departamentos}">
								<td th:text="${departamento.id}"></td>
								<td th:text="${departamento.nombre}"></td>
								<td th:text="${departamento.descripcion}"></td>
								<td><span th:if="${departamento.activo == 1}"
									class="badge bg-success"> Activo </span> <span
									th:unless="${departamento.activo == 1}" class="badge bg-danger">
										Inactivo </span></td>
								<td><img
									th:if="${departamento.fotoUbicacion != null && departamento.fotoUbicacion != '' && departamento.fotoUbicacion != 'no-image.png'}"
									th:src="@{/images/{img}(img=${departamento.fotoUbicacion})}"
									class="img-thumbnail"
									style="width: 100px; height: 60px; object-fit: cover;" /> <img
									th:unless="${departamento.fotoUbicacion != null && departamento.fotoUbicacion != '' && departamento.fotoUbicacion != 'no-image.png'}"
									th:src="@{/img/no-image.png}" class="img-thumbnail"
									style="width: 100px; height: 60px; object-fit: cover;" /></td>
								<td>
									<div class="btn-group" role="group">
										<a th:href="@{/departamento/ver/{id}(id=${departamento.id})}"
											class="btn btn-info btn-sm text-white" title="Ver Detalle">
											<i class="fas fa-eye"></i>
										</a> <a
											th:href="@{/departamento/editar/{id}(id=${departamento.id})}"
											class="btn btn-warning btn-sm text-white" title="Editar">
											<i class="fas fa-edit"></i>
										</a> <a
											th:href="@{/departamento/eliminar/{id}(id=${departamento.id})}"
											class="btn btn-danger btn-sm"
											onclick="return confirm('¿Estás seguro de desactivar este departamento?');"
											title="Eliminar"> <i class="fas fa-trash"></i>
										</a>
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</div>
				<div class="text-center mt-4">
					<a class="btn btn-primary shadow-sm"
						th:href="@{/departamento/nuevo}"> <i
						class="fas fa-plus-circle me-1"></i> Agregar Nuevo Departamento
					</a>
				</div>
			</div>

		</div>
	</main>
	<footer th:insert="~{fragmento/fragment :: footer}"></footer>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
