<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Usuarios</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div th:insert="~{fragmento/menu :: menu-principal}"></div>
    
    <h2 class="mb-4">Usuarios Registrados</h2>
    
    <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>

    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Username</th>
                <th>Estatus</th>
                <th>Fecha Registro</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="usuario : ${listaUsuarios}">
                <td th:text="${usuario.id}"></td>
                <td th:text="${usuario.nombre}"></td>
                <td th:text="${usuario.email}"></td>
                <td th:text="${usuario.username}"></td>
                <td>
                    <span th:class="${usuario.estatus == 1 ? 'badge bg-success' : 'badge bg-danger'}"
                          th:text="${usuario.estatus == 1 ? 'Activo' : 'Inactivo'}"></span>
                </td>
                <td th:text="${#dates.format(usuario.fechaRegistro, 'dd/MM/yyyy')}"></td>
                <td>
                    <a th:href="@{/usuarios/delete/{id} (id=${usuario.id})}" 
                       onclick="return confirm('¿Estás seguro?')" 
                       class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
