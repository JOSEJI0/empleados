<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Registro de Usuario</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
	<div class="row justify-content-center">
		<div class="col-md-6">
			<div class="card">
				<div class="card-header bg-primary text-white">
					<h4>Formulario de Registro</h4>
				</div>
				<div class="card-body">
					<form th:action="@{/usuarios/save}" th:object="${usuario}"
						method="post">
						<div class="mb-3">
							<label class="form-label">Nombre Completo</label> <input
								type="text" th:field="*{nombre}" class="form-control" required>
						</div>
						<div class="mb-3">
							<label class="form-label">Correo Electrónico</label> <input
								type="email" th:field="*{email}" class="form-control" required>
						</div>
						<div class="mb-3">
							<label class="form-label">Nombre de Usuario</label> <input
								type="text" th:field="*{username}" class="form-control" required>
						</div>
						<div class="mb-3">
							<label class="form-label">Contraseña</label> <input
								type="password" th:field="*{password}" class="form-control"
								required>
						</div>
						<button type="submit" class="btn btn-success w-100">Registrarme</button>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
