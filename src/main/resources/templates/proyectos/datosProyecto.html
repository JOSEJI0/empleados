<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Proyectos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f8f9fa; } main { flex: 1; }</style>
</head>
<body>

    <header th:insert="~{fragmentos/fragments :: header}"></header>

    <main class="container mt-5 mb-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                <h3 class="mb-0 text-secondary fw-bold">Gestión de Proyectos</h3>
                <a th:href="@{/proyectos/crear}" class="btn btn-primary">
                    <i class="bi bi-folder-plus"></i> Nuevo Proyecto
                </a>
            </div>

            <div class="card-body p-0">
                <div th:if="${msg != null}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${msg}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle mb-0">
                        <thead class="table-dark text-center">
                            <tr>
                                <th>ID</th>
                                <th>Nombre del Proyecto</th>
                                <th>Estado Operativo</th>
                                <th>Fecha Inicio</th>
                                <th>Fecha Fin</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="proyecto : ${proyectosLista}">
                                <td class="text-center fw-bold" th:text="${proyecto.id}">1</td>
                                
                                <td>
                                    <div class="fw-bold text-dark"><i class="bi bi-kanban me-2 text-primary"></i><span th:text="${proyecto.nombre}">Proyecto</span></div>
                                </td>

                                <td class="text-center">
                                    <span th:if="${proyecto.statusProyecto != null and proyecto.statusProyecto.name() == 'INICIO'}" class="badge bg-info text-dark rounded-pill"><i class="bi bi-play-circle me-1"></i>En Inicio</span>
                                    <span th:if="${proyecto.statusProyecto != null and proyecto.statusProyecto.name() == 'EN_PROCESO'}" class="badge bg-primary rounded-pill"><i class="bi bi-gear-wide-connected me-1"></i>En Proceso</span>
                                    <span th:if="${proyecto.statusProyecto != null and proyecto.statusProyecto.name() == 'FINALIZADO'}" class="badge bg-success rounded-pill"><i class="bi bi-check2-all me-1"></i>Finalizado</span>
                                    <span th:if="${proyecto.statusProyecto != null and proyecto.statusProyecto.name() == 'CANCELADO'}" class="badge bg-danger rounded-pill"><i class="bi bi-x-octagon me-1"></i>Cancelado</span>
                                    <span th:if="${proyecto.statusProyecto == null}" class="badge bg-secondary rounded-pill">Sin Estado</span>
                                </td>
                                
                                <td class="text-center" th:text="${#dates.format(proyecto.fechaInicio, 'dd-MM-yyyy')}">01-01-2024</td>
                                <td class="text-center" th:text="${#dates.format(proyecto.fechaFin, 'dd-MM-yyyy')}">31-12-2024</td>
                                
                                <td class="text-center">
                                    <div class="btn-group" role="group">
                                    	<a th:href="@{/proyectos/asignar/{id}(id=${proyecto.id})}" class="btn btn-outline-success btn-sm" title="Asignar Personal">
                                            <i class="bi bi-person-plus-fill"></i>
                                        </a>
                                        <a th:href="@{/proyectos/ver/{id}(id=${proyecto.id})}" class="btn btn-outline-info btn-sm" title="Ver Detalle">
                                            <i class="bi bi-eye-fill"></i>
                                        </a>
                                        <a th:href="@{/proyectos/editar/{id}(id=${proyecto.id})}" class="btn btn-outline-warning btn-sm" title="Editar">
                                            <i class="bi bi-pencil-fill"></i>
                                        </a>
                                        <a th:href="@{/proyectos/eliminar/{id}(id=${proyecto.id})}" class="btn btn-outline-danger btn-sm" title="Mover a Papelera" 
                                           onclick="return confirm('¿Estás seguro de enviar este proyecto a la papelera?');">
                                            <i class="bi bi-trash-fill"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <div th:if="${proyectosLista.empty}" class="text-center p-5 text-muted">
                        <i class="bi bi-folder-x fs-1"></i>
                        <p class="mt-2">No hay proyectos registrados en el sistema.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:insert="~{fragmentos/fragments :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
