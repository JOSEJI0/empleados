<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f8f9fa; } main { flex: 1; } .label-custom { font-size: 0.85rem; font-weight: 700; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; } .value-custom { font-size: 1.1rem; color: #212529; margin-bottom: 0; } .doc-icon { font-size: 4.5rem; color: #6c757d; }</style>
</head>
<body>

    <header th:insert="~{/fragmentos/fragments :: header}"></header>

    <main class="container mt-5 mb-5">
        <div class="mb-4">
            <a th:href="@{/proyectos/proyectos}" class="btn btn-link text-decoration-none p-0 text-dark fw-bold">
                <i class="bi bi-arrow-left"></i> Volver al portafolio de proyectos
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                <h3 class="mb-0 text-secondary fw-bold">Ficha Técnica del Proyecto</h3>
                <a th:href="@{/proyectos/editar/{id}(id=${proyecto.id})}" class="btn btn-outline-warning">
                    <i class="bi bi-pencil-fill"></i> Editar
                </a>
            </div>

            <div class="card-body p-4 p-md-5">
                <div class="row">
                    <div class="col-md-3 text-center border-end-md d-flex flex-column justify-content-center mb-4 mb-md-0">
                        <i class="bi bi-kanban doc-icon mb-3"></i>
                        <h5 class="fw-bold mb-1">Proyecto N° <span th:text="${proyecto.id}">0</span></h5>
                        
                        <div class="mt-3">
                            <span th:text="${proyecto.statusProyecto}" 
                                  th:class="${proyecto.statusProyecto != null and proyecto.statusProyecto.name() == 'FINALIZADO'} ? 'badge bg-success fs-6 px-3 py-2' : 
                                            (${proyecto.statusProyecto != null and proyecto.statusProyecto.name() == 'EN_PROCESO'} ? 'badge bg-primary fs-6 px-3 py-2' : 
                                            (${proyecto.statusProyecto != null and proyecto.statusProyecto.name() == 'CANCELADO'} ? 'badge bg-danger fs-6 px-3 py-2' : 'badge bg-secondary fs-6 px-3 py-2'))">
                            </span>
                        </div>
                    </div>

                    <div class="col-md-9 ps-md-5">
                        <div class="row g-4">
                            <div class="col-12">
                                <h5 class="text-primary border-bottom pb-2 mb-3"><i class="bi bi-info-square me-2"></i>Datos Generales</h5>
                            </div>

                            <div class="col-12 mb-2">
                                <p class="label-custom mb-1"><i class="bi bi-folder-fill me-1"></i> Nombre del Proyecto</p>
                                <p class="value-custom fw-bold text-dark fs-4" th:text="${proyecto.nombre}">Nombre</p>
                            </div>

                            <div class="col-sm-6">
                                <p class="label-custom mb-1"><i class="bi bi-calendar-play me-1"></i> Fecha de Inicio</p>
                                <p class="value-custom" th:text="${#dates.format(proyecto.fechaInicio, 'dd-MM-yyyy')}">01-01-2024</p>
                            </div>
                            
                            <div class="col-sm-6">
                                <p class="label-custom mb-1"><i class="bi bi-calendar-check me-1"></i> Fecha de Término</p>
                                <p class="value-custom" th:text="${#dates.format(proyecto.fechaFin, 'dd-MM-yyyy')}">31-12-2024</p>
                            </div>

                            <div class="col-12 mt-4">
                                <p class="label-custom mb-1"><i class="bi bi-card-text me-1"></i> Descripción y Alcance</p>
                                <div class="p-3 bg-light rounded border">
                                    <p class="mb-0 text-dark" th:text="${proyecto.descripcion}">Descripción...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:insert="~{/fragmentos/fragments :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
