<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>body { background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; } main { flex: 1; } .card-header-custom { background: linear-gradient(to right, #212529, #343a40); color: white; }</style>
</head>
<body>

    <header th:insert="~{fragmentos/fragments :: header}"></header>

    <main class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-header card-header-custom p-4">
                        <h4 class="mb-0"><i class="bi bi-kanban me-2"></i>Información del Proyecto</h4>
                    </div>
                    
                    <div class="card-body p-4">
                        
                        <form th:action="@{/proyectos/guardar}" method="post" th:object="${proyecto}">
                            <input type="hidden" th:field="*{id}" />

                            <div class="row mb-3">
                                <div class="col-md-7">
                                    <label class="form-label fw-bold">Nombre del Proyecto</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-folder"></i></span>
                                        <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Migración de Base de Datos" required>
                                    </div>
                                </div>
                                
                                <div class="col-md-5 mt-3 mt-md-0">
                                    <label class="form-label fw-bold text-primary">Estado Actual</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-activity"></i></span>
                                        <select th:field="*{statusProyecto}" class="form-select border-primary" required>
                                            <option value="" disabled selected>-- Seleccione Estado --</option>
                                            <option th:each="estado : ${T(com.example.demo.model.Proyecto.StatusProyecto).values()}" 
                                                    th:value="${estado}" 
                                                    th:text="${estado}">
                                            </option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Fecha de Inicio</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-calendar-play"></i></span>
                                        <input type="date" th:field="*{fechaInicio}" class="form-control" required>
                                    </div>
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label class="form-label fw-bold">Fecha de Fin (Estimada)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="bi bi-calendar-check"></i></span>
                                        <input type="date" th:field="*{fechaFin}" class="form-control" required>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Descripción / Alcance</label>
                                <textarea th:field="*{descripcion}" class="form-control" rows="4" placeholder="Describe los objetivos y alcance del proyecto..."></textarea>
                            </div>
                            
                            <hr class="my-4">

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/proyectos/proyectos}" class="btn btn-secondary px-4">
                                    <i class="bi bi-x-circle me-1"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-success px-4">
                                    <i class="bi bi-save me-1"></i> Guardar Proyecto
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <footer th:insert="~{fragmentos/fragments :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
