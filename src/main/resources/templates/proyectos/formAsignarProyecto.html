<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Asignar Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f8f9fa; } main { flex: 1; }</style>
</head>
<body>
    <header th:insert="~{fragmentos/fragments :: header}"></header>

    <main class="container mt-5 mb-5">
        <div class="card shadow-sm border-0 border-top border-primary border-4 mx-auto" style="max-width: 800px;">
            <div class="card-header bg-white py-3">
                <h4 class="mb-0 text-primary">
                    <i class="bi bi-person-workspace me-2"></i>Asignar Personal al Proyecto
                </h4>
            </div>
            <div class="card-body p-4">
                
                <div class="alert alert-info">
                    Estás asignando personal al proyecto: <strong th:text="${proyecto.nombre}">Proyecto</strong>
                </div>

                <form th:action="@{/proyectos/guardarAsignacion}" method="post">
                    <input type="hidden" name="idProyecto" th:value="${proyecto.id}" />

                    <div class="mb-3">
                        <label class="form-label fw-bold">Seleccionar Empleado</label>
                        <select class="form-select" name="idEmpleado" required>
                            <option value="">-- Seleccione un Empleado Activo --</option>
                            <option th:each="emp : ${listaEmpleados}" 
                                    th:value="${emp.id}" 
                                    th:text="${emp.nombre + ' ' + emp.apellidos + ' (' + (emp.departamento != null ? emp.departamento.nombre : 'Sin Depto') + ')'}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre de la Tarea / Rol</label>
                        <input type="text" class="form-control" name="nombreActividad" placeholder="Ej: Desarrollador Backend, Diseño de BD..." required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Descripción Específica</label>
                        <textarea class="form-control" name="descripcionActividad" rows="3" placeholder="Detalla las responsabilidades que tendrá en este proyecto..." required></textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a th:href="@{/proyectos/proyectos}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i> Guardar Asignación</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer th:insert="~{fragmentos/fragments :: footer}"></footer>
</body>
</html>
