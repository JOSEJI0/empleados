<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Actividad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
        .card-header-custom { background: linear-gradient(to right, #1f2327, #3b4248); color: white; }
    </style>
</head>
<body>

    <header th:insert="~{fragmentos/fragments :: header}"></header>

    <main class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-header card-header-custom p-4">
                        <h4 class="mb-0"><i class="bi bi-pencil-square me-2"></i>Registrar Actividad</h4>
                    </div>
                    
                    <div class="card-body p-4">
                        <form th:action="@{/actividad/guardar}" method="post" th:object="${actividad}">
                            
                            <input type="hidden" th:field="*{idActividad}" />

                            <div class="mb-3">
                                <label class="form-label fw-bold">Vincular a un Proyecto</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-kanban"></i></span>
                                    <select th:field="*{proyecto.id}" class="form-select" required>
                                        <option value="" disabled selected>-- Seleccione el Proyecto Destino --</option>
                                        <option th:each="proy : ${proyectos}" 
                                                th:value="${proy.id}" 
                                                th:text="${proy.nombre}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre de la Actividad / Tarea</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-bookmark-star"></i></span>
                                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Maquetado de interfaces de usuario" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Descripción del Trabajo</label>
                                <textarea th:field="*{descripcion}" class="form-control" rows="4" placeholder="Especifica con detalle los entregables o requerimientos de esta actividad..." required></textarea>
                            </div>
                            
                            <hr class="my-4">

                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/actividad/listar}" class="btn btn-secondary px-4">
                                    <i class="bi bi-x-circle me-1"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-success px-4">
                                    <i class="bi bi-save me-1"></i> Guardar Actividad
                                </button>
                            </div>
                            
                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <footer th:insert="~{fragmentos/fragments :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
