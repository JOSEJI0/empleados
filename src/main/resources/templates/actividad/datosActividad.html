<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Gestión | Lista de Actividades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
    </style>
</head>
<body class="bg-light">
    <header th:insert="~{fragmento/fragment :: header}"></header>

    <main class="container mt-5 mb-5">
        <div th:if="${msg} != null" class="alert alert-success alert-dismissible fade show mb-4 shadow-sm" role="alert">
            <i class="fas fa-check-circle me-1"></i> <span th:text="${msg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div th:if="${error} != null" class="alert alert-danger alert-dismissible fade show mb-4 shadow-sm" role="alert">
            <i class="fas fa-exclamation-triangle me-1"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h2 class="text-primary mb-0"><i class="fas fa-clipboard-list me-2"></i>GESTIÓN DE ACTIVIDADES</h2>
                <a class="btn btn-primary shadow-sm" th:href="@{/actividad/nuevo}">
                    <i class="fas fa-plus-circle me-1"></i> Nueva Actividad
                </a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover text-center align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Descripción</th>
                                <th>Proyecto Asociado</th>
                                <th>Fecha Inicio</th>
                                <th>Fecha Fin</th>
                                <th>Operaciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="act : ${actividades}">
                                <td th:text="${act.idActividad}"></td>
                                <td class="fw-bold text-start ps-3" th:text="${act.nombre}"></td>
                                <td class="text-start text-muted ps-3" th:text="${act.descripcion != null && !act.descripcion.isEmpty() ? act.descripcion : 'Sin descripción'}"></td>
                                <td>
                                    <span class="badge bg-secondary text-uppercase" 
                                          th:text="${act.proyecto != null ? act.proyecto.nombre : 'Sin Proyecto'}"></span>
                                </td>
                                <td th:text="${act.fechaInicio != null ? #dates.format(act.fechaInicio, 'dd/MM/yyyy') : 'N/A'}"></td>
                                <td th:text="${act.fechaFin != null ? #dates.format(act.fechaFin, 'dd/MM/yyyy') : 'En curso'}"></td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/actividad/editar/{id}(id=${act.idActividad})}"
                                           class="btn btn-warning btn-sm text-white" title="Editar">
                                            <i class="fas fa-edit"></i>
                                        </a> 
                                        <a th:href="@{/actividad/eliminar/{id}(id=${act.idActividad})}"
                                           class="btn btn-danger btn-sm"
                                           onclick="return confirm('¿Está seguro de que desea eliminar permanentemente esta actividad?');"
                                           title="Eliminar"> 
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(actividades)}">
                                <td colspan="7" class="text-muted py-4">No se encontraron actividades registradas en el sistema.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    
    <footer th:insert="~{fragmento/fragment :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
