<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TSP | Registro de Proyecto</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
	<header th:insert="~{fragmento/fragment :: header}"></header>
	<main class="container mt-5 mb-5">
		<div class="card shadow">
			<div class="card-header bg-white py-3">
				<h2 class="text-center mb-0 text-primary">FORMULARIO DE
					PROYECTO</h2>
			</div>
			<div class="card-body p-4">
				<form th:action="@{/proyecto/guardar}" th:object="${proyecto}"
					method="post">
					<input type="hidden" th:field="*{id}"> <input type="hidden"
						th:field="*{activo}">

					<div class="col-md-12">
						<label class="form-label fw-bold">Nombre del Proyecto:</label>
						<div class="input-group">
							<span class="input-group-text"><i
								class="fas fa-project-diagram"></i></span> <input type="text"
								th:field="*{nombre}" class="form-control"
								placeholder="Ej: Sistema de Inventarios" required>
						</div>
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold">Fecha de Inicio:</label>
						<div class="input-group">
							<span class="input-group-text"><i
								class="fas fa-calendar-plus"></i></span> <input type="date"
								th:field="*{fechaInicio}" class="form-control" required>
						</div>
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold">Fecha de Finalización
							(Opcional):</label>
						<div class="input-group">
							<span class="input-group-text"><i
								class="fas fa-calendar-check"></i></span> <input type="date"
								th:field="*{fechaFin}" class="form-control">
						</div>
					</div>

					<div class="col-md-6">
						<label class="form-label fw-bold">Estatus del Proyecto:</label> <select
							th:field="*{statusProyecto}" class="form-select" required>
							<option value="">Seleccione uno...</option>
							<option
								th:each="status : ${T(itch.tsp.model.Proyecto.StatusProyecto).values()}"
								th:value="${status}" th:text="${status}"></option>
						</select>
					</div>

					<div class="col-12 mt-5 text-center">
						<hr>
						<button type="submit" class="btn btn-success px-4 shadow-sm">
							<i class="fas fa-save me-1"></i> Guardar Proyecto
						</button>
						<a th:href="@{/proyecto/listar}"
							class="btn btn-secondary px-4 ms-2 shadow-sm"> <i
							class="fas fa-arrow-left me-1"></i> Regresar
						</a>
					</div>
				</form>
			</div>
		</div>
	</main>
	<footer th:insert="~{fragmento/fragment :: footer}"></footer>
</body>
</html>
