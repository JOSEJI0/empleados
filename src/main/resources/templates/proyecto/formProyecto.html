<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TSP | Formulario de Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <header th:insert="~{fragmento/fragment :: header}"></header>
    
    <main class="container mt-5 mb-5">
        <div class="card shadow border-0 rounded-3">
            <div class="card-header bg-white py-3 border-bottom">
                <h2 class="text-center mb-0 text-primary fw-bold">FORMULARIO DE PROYECTO</h2>
            </div>
            <div class="card-body p-4">
                
                <div th:if="${error} != null" class="alert alert-danger alert-dismissible fade show mb-4 shadow-sm" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form th:action="@{/proyecto/guardar}" th:object="${proyecto}" method="post" class="row g-4">
                    <input type="hidden" th:field="*{id}"> 
                    <input type="hidden" th:field="*{activo}">

                    <div class="col-12">
                        <label class="form-label fw-bold">Nombre del Proyecto:</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-project-diagram"></i></span> 
                            <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Sistema de Control Escolar" required>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Fecha de Inicio:</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-calendar-plus"></i></span> 
                            <input type="date" th:field="*{fechaInicio}" class="form-control" required>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Fecha de Finalización (Opcional):</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-calendar-check"></i></span> 
                            <input type="date" th:field="*{fechaFin}" class="form-control">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Estatus del Avance:</label> 
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-tasks"></i></span>
                            <select th:field="*{statusProyecto}" class="form-select" required>
                                <option value="">Seleccione uno...</option>
                                <option th:each="status : ${T(itch.tsp.model.Proyecto.StatusProyecto).values()}"
                                        th:value="${status}" th:text="${status}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Descripción General:</label>
                        <textarea th:field="*{descripcion}" class="form-control" rows="3" placeholder="Escriba los objetivos principales del proyecto..."></textarea>
                    </div>

                    <div class="col-12 text-center mt-4">
                        <hr>
                        <button type="submit" class="btn btn-success px-4 shadow-sm fw-bold">
                            <i class="fas fa-save me-1"></i> Guardar Proyecto
                        </button>
                        <a th:href="@{/proyecto/listar}" class="btn btn-secondary px-4 ms-2 shadow-sm">
                            <i class="fas fa-arrow-left me-1"></i> Regresar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer th:insert="~{fragmento/fragment :: footer}"></footer>
</body>
</html>
