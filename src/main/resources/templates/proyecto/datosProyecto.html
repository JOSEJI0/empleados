<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Lista de Proyectos</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
	<header th:insert="~{fragmento/fragment :: header}"></header>
	<main class="container mt-4">
		<div class="card mb-4 shadow-sm">
			<div class="card-body">
				<form th:action="@{/proyecto/buscar}" method="get"
					class="row g-3 mb-4">
					<div class="col-md-4">
						<input type="text" name="nombre" class="form-control"
							placeholder="Buscar por nombre...">
					</div>
					<div class="col-md-3">
						<input type="date" name="inicio" class="form-control">
					</div>
					<div class="col-md-3">
						<input type="date" name="fin" class="form-control">
					</div>
					<div class="col-md-2">
						<button type="submit" class="btn btn-dark w-100">Filtrar</button>
					</div>
				</form>
			</div>
		</div>

		<div class="card shadow">
			<div class="card-header bg-white py-3 d-flex justify-content-between">
				<h2 class="text-primary mb-0">Gestión de Proyectos</h2>
				<a th:href="@{/proyecto/nuevo}" class="btn btn-success">+ Nuevo</a>
			</div>
			<div class="card-body">
				<table class="table table-hover">
					<thead class="table-dark">
						<tr>
							<th>Nombre</th>
							<th>Inicio</th>
							<th>Fin</th>
							<th>Acciones</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="p : ${proyectos}">
							<td th:text="${p.nombre}"></td>
							<td th:text="${#dates.format(p.fechaInicio, 'dd/MM/yyyy')}"></td>
							<td
								th:text="${p.fechaFin != null ? #dates.format(p.fechaFin, 'dd/MM/yyyy') : 'En curso'}"></td>
							<td><a th:href="@{/proyecto/ver/{id}(id=${p.id})}"
								class="btn btn-info btn-sm text-white"><i class="fas fa-eye"></i></a>
								<a th:href="@{/proyecto/editar/{id}(id=${p.id})}"
								class="btn btn-warning btn-sm text-white"><i
									class="fas fa-edit"></i></a> <a
								th:href="@{/proyecto/eliminar/{id}(id=${p.id})}"
								class="btn btn-danger btn-sm"
								onclick="return confirm('¿Desactivar?')"><i
									class="fas fa-trash"></i></a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</main>
</body>
</html>
