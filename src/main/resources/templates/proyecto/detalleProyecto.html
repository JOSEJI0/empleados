<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Proyecto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header th:insert="~{fragmento/fragment :: header}"></header>
    <main class="container mt-5">
        <div class="card shadow" th:if="${proyecto != null}">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Información del Proyecto #<span th:text="${proyecto.id}"></span></h3>
            </div>
            <div class="card-body">
                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item"><strong>Nombre:</strong> <span th:text="${proyecto.nombre}"></span></li>
                    <li class="list-group-item"><strong>Descripción:</strong> <span th:text="${proyecto.descripcion}"></span></li>
                    <li class="list-group-item"><strong>Avance:</strong> <span class="badge bg-info" th:text="${proyecto.statusProyecto}"></span></li>
                    <li class="list-group-item"><strong>Fecha Inicio:</strong> <span th:text="${#dates.format(proyecto.fechaInicio, 'dd/MM/yyyy')}"></span></li>
                    <li class="list-group-item"><strong>Fecha Fin:</strong> <span th:text="${proyecto.fechaFin != null ? #dates.format(proyecto.fechaFin, 'dd/MM/yyyy') : 'No asignada'}"></span></li>
                </ul>
                <div class="text-center">
                    <a th:href="@{/proyecto/listar}" class="btn btn-secondary">Regresar</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
