<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio | Gestión de Proyectos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header th:insert="~{fragmento/fragment :: header}"></header>
    <main class="container mt-5">
        <h2 class="text-center text-primary mb-4">Proyectos Activos (Sin fecha de fin)</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" th:each="p : ${proyectosInicio}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-uppercase" th:text="${p.nombre}"></h5>
                        <p class="card-text">
                            <strong>Iniciado el:</strong> 
                            <span th:text="${#dates.format(p.fechaInicio, 'dd/MM/yyyy')}"></span>
                        </p>
                    </div>
                    <div class="card-footer bg-transparent border-0 pb-3">
                        <a th:href="@{/proyecto/ver/{id}(id=${p.id})}" class="btn btn-primary w-100">Ver detalles del proyecto</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
